version: "3.9"

# ── Shared config reused by both app instances ─────────────────────────────────
x-app-base: &app-base
  build: .
  env_file: .env
  environment:
    DATABASE_HOST: db
    DATABASE_PORT: "5432"
    REDIS_HOST: redis
    REDIS_PORT: "6379"
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-hackathon_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-hackathon_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis (cache) ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── App instance 1 ────────────────────────────────────────────────────────────
  app1:
    <<: *app-base
    container_name: hackathon_app1

  # ── App instance 2 ────────────────────────────────────────────────────────────
  app2:
    <<: *app-base
    container_name: hackathon_app2

  # ── Nginx load balancer ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app1
      - app2
    restart: unless-stopped

volumes:
  postgres_data:
