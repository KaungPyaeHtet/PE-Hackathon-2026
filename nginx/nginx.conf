upstream flask_app {
    # Round-robin across both app instances (default Nginx strategy)
    server app1:5000;
    server app2:5000;

    # Keep persistent connections to upstream to avoid TCP overhead
    keepalive 32;
}

server {
    listen 80;

    # Forward real client IP so app logs are useful
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Use HTTP/1.1 for keepalive upstream support
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Timeouts
    proxy_connect_timeout 5s;
    proxy_read_timeout    30s;

    location / {
        proxy_pass http://flask_app;
    }

    # Health check Nginx can expose without hitting the app
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
